AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Terraform remote-state backend: a single S3 bucket, versioned and
  encrypted, with public access blocked. State locking relies on
  Terraform's native S3 locking (use_lockfile=true) — no DynamoDB table.

Parameters:
  Name:
    Type: String
    Description: >-
      Logical name used to derive the default bucket name
      (tfstate-${Name}-${AWS::AccountId}-${AWS::Region}). Always supplied by
      the caller.
  BucketName:
    Type: String
    Default: ''
    Description: >-
      Explicit bucket name override. When empty, the bucket name defaults to
      tfstate-${Name}-${AWS::AccountId}-${AWS::Region}.
  NoncurrentVersionExpirationInDays:
    Type: Number
    Default: 365
    Description: >-
      Number of days a noncurrent object version is kept before it expires.

Conditions:
  BucketNameProvided: !Not [!Equals [!Ref BucketName, '']]

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - BucketNameProvided
        - !Ref BucketName
        - !Sub 'tfstate-${Name}-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireNoncurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref NoncurrentVersionExpirationInDays

Outputs:
  BucketName:
    Value: !Ref Bucket
