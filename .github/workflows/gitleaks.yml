name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  gitleaks:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: false
          cache: true

      - name: Install gitleaks (version pinned in mise.toml)
        run: mise install gitleaks

      - name: Run gitleaks (git history scan)
        run: mise exec gitleaks -- gitleaks git . --no-banner --redact --verbose --exit-code 1
